<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>別表Ⅱ 摘要欄 記載事項 検索</title>
<style>
:root{
  --accent:#b0122a; --accent2:#7a0000; --applied:#1f8a4c; --applied-bg:#e7f6ec;
  --ink:#20242b; --sub:#6b7280; --line:#e7e5ea; --card:#ffffff;
  --bg1:#f6f5f9; --bg2:#eef0f6; --chip:#f3eef0; --code:#5b4636;
  --fs:16px; --lh:1.9;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:"Yu Gothic","Hiragino Kaku Gothic ProN","Noto Sans JP","Meiryo",sans-serif;
  color:var(--ink);background:linear-gradient(160deg,var(--bg1),var(--bg2));-webkit-font-smoothing:antialiased;}
button{font-family:inherit}
.app{display:grid;grid-template-rows:auto 1fr;height:100vh}
header{position:sticky;top:0;z-index:20;backdrop-filter:blur(8px);background:rgba(255,255,255,.85);
  border-bottom:1px solid var(--line);padding:14px clamp(14px,3vw,34px) 12px;}
.brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.brand h1{font-size:19px;margin:0;letter-spacing:.02em}
.brand .tag{font-size:12px;color:#fff;background:var(--accent);padding:2px 9px;border-radius:999px;font-weight:700}
.brand .note{font-size:12px;color:var(--sub)}
.modes{display:flex;gap:6px;margin-top:12px}
.modes button{border:1.5px solid var(--line);background:#fff;border-radius:11px;padding:7px 14px;cursor:pointer;
  font-size:13px;font-weight:700;color:#555}
.modes button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.controls{display:flex;gap:12px;align-items:center;margin-top:10px;flex-wrap:wrap}
.searchwrap{position:relative;flex:1 1 340px;min-width:220px}
.searchwrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.45}
#q{width:100%;padding:13px 40px 13px 42px;font-size:17px;border:1.5px solid var(--line);border-radius:14px;
  background:#fff;outline:none;transition:.15s;font-family:inherit}
#q:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(176,18,42,.10)}
#clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:#eceaf0;
  width:26px;height:26px;border-radius:50%;cursor:pointer;color:#555;font-size:15px;display:none}
.fontctl{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:4px}
.fontctl span{font-size:11px;color:var(--sub);padding:0 4px}
.fontctl button{border:none;background:transparent;cursor:pointer;border-radius:8px;padding:6px 10px;color:#444;font-weight:700;line-height:1}
.fontctl button.on{background:var(--accent);color:#fff}
.fontctl button:nth-child(2){font-size:12px}
.fontctl button:nth-child(3){font-size:15px}
.fontctl button:nth-child(4){font-size:18px}
.kana{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.kana button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:5px 10px;cursor:pointer;font-size:13px;color:#444}
.kana button.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.main{display:grid;grid-template-columns:minmax(280px,380px) 1fr;overflow:hidden}
.side{border-right:1px solid var(--line);overflow-y:auto;background:rgba(255,255,255,.55)}
.count{padding:10px 16px;font-size:12px;color:var(--sub);position:sticky;top:0;background:rgba(255,255,255,.9);
  border-bottom:1px solid var(--line);z-index:2}
.list{list-style:none;margin:0;padding:6px}
.list li{padding:11px 13px;border-radius:12px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;
  transition:.12s;border:1px solid transparent}
.list li:hover{background:#fff}
.list li.sel{background:#fff;border-color:var(--accent);box-shadow:0 2px 10px rgba(0,0,0,.05)}
.list .no{flex:0 0 auto;min-width:30px;height:24px;padding:0 6px;border-radius:7px;background:var(--chip);
  color:var(--accent2);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
.list .nm{font-size:14px;line-height:1.5;font-weight:600}
.list .snip{display:block;font-size:12px;color:var(--sub);font-weight:400;line-height:1.55;margin-top:4px}
.list .ftag{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:#9a8;border-radius:5px;
  padding:1px 6px;margin-right:6px;vertical-align:1px}
.list .ftag.k{background:#b0122a}.list .ftag.h{background:#1f8a4c}.list .ftag.e{background:#8a6d1f}.list .ftag.n{background:#555}
mark{background:#ffe08a;color:inherit;border-radius:3px;padding:0 1px}
.detail{overflow-y:auto;padding:clamp(16px,3vw,40px);scroll-behavior:smooth}
.detail .inner{max-width:1000px;margin:0 auto}
.dhead{display:flex;gap:14px;align-items:flex-start;margin-bottom:6px}
.dhead .no{flex:0 0 auto;background:var(--accent);color:#fff;font-weight:800;border-radius:12px;padding:8px 14px;font-size:calc(var(--fs)*.95)}
.dhead h2{margin:2px 0;font-size:calc(var(--fs)*1.5);line-height:1.35}
.eff{display:inline-block;margin:6px 0 2px;background:var(--applied-bg);color:#0d5c33;border:1px solid #bfe6cd;
  padding:4px 12px;border-radius:999px;font-size:calc(var(--fs)*.82)}
.block{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:clamp(14px,2vw,24px);
  margin:18px 0;box-shadow:0 6px 22px rgba(30,20,40,.05)}
.klabel{display:inline-flex;align-items:center;gap:7px;font-size:calc(var(--fs)*.8);font-weight:800;color:var(--accent2);
  letter-spacing:.03em;margin-bottom:10px}
.klabel::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--accent)}
.ktext{font-size:var(--fs);line-height:var(--lh);white-space:pre-wrap;word-break:break-word}
.hylabel{font-size:calc(var(--fs)*.8);font-weight:800;color:#334;margin:18px 0 10px;padding-top:14px;
  border-top:1px dashed var(--line);letter-spacing:.03em}
.items{display:flex;flex-direction:column;gap:9px}
.item{display:flex;gap:11px;align-items:flex-start;padding:11px 13px;border-radius:12px;background:#faf9fb;border:1px solid var(--line)}
.item.ap{background:var(--applied-bg);border-color:#c7e9d3}
.badge{flex:0 0 auto;font-size:calc(var(--fs)*.7);font-weight:800;padding:3px 8px;border-radius:7px;margin-top:2px;white-space:nowrap}
.badge.ap{background:var(--applied);color:#fff}
.badge.no{background:#eceaef;color:#8a8a97}
.itxt{flex:1 1 auto}
.hy{font-size:var(--fs);line-height:1.7;white-space:pre-wrap;word-break:break-word}
.code{display:inline-block;margin-top:5px;font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:calc(var(--fs)*.78);
  color:var(--code);background:#f1ece6;border:1px solid #e5dccf;padding:1px 8px;border-radius:6px;cursor:pointer}
.code:hover{background:#e9e0d4}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--sub);gap:14px;text-align:center;padding:30px}
.empty svg{opacity:.3}
.backbtn{display:none}
footer.legend{font-size:12px;color:var(--sub);padding:8px 16px;border-top:1px solid var(--line);display:flex;gap:16px;
  flex-wrap:wrap;background:rgba(255,255,255,.7)}
.legend .dot{display:inline-flex;align-items:center;gap:6px}
.legend .g{width:12px;height:12px;border-radius:4px;background:var(--applied)}
@media(max-width:760px){
  .main{grid-template-columns:1fr}.side{border-right:none}
  body.detail-open .side{display:none}
  body:not(.detail-open) .detail{display:none}
  .backbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;border-radius:10px;
    padding:8px 12px;margin-bottom:14px;cursor:pointer;font-weight:700;color:var(--accent2)}
}
</style>
<meta name="theme-color" content="#b0122a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="別表Ⅱ検索">
<style>header{padding-top:calc(14px + env(safe-area-inset-top))}
footer.legend{padding-bottom:calc(8px + env(safe-area-inset-bottom))}
@media(display-mode:standalone){.brand .note{display:none}}</style>
</head>
<body>
<div class="app">
 <header>
  <div class="brand">
   <h1>別表Ⅱ 摘要欄 記載事項 検索</h1>
   <span class="tag">薬価基準</span>
   <span class="note">令和8年度診療報酬改定関連通知（令和8年6月1日適用）</span>
  </div>

    <input id="q" type="search" placeholder="医薬品名称で検索（1文字からOK・ひらがな可）" autocomplete="off" autofocus>

   <div class="fontctl">

   <div class="count" id="count"></div>

  </aside>
  <section class="detail" id="detail">

    </div>
   </div>
  </section>
 </div>
 <footer class="legend">

 </footer>
</div>
<script>

ること。\n　　イ　医師免許取得後２年の初期研修を修了した後に、４年以上の臨床経験を有し、そのうち３年以上は季節性アレルギー性鼻炎を含むアレルギー診療の臨床研修を行っていること。\n　　　【小児季節性アレルギー性鼻炎患者に投与する場合】\n　　ウ　医師免許取得後２年の初期研修を修了した後に、４年以上の耳鼻咽喉科診療の臨床研修を行っていること。\n　　エ　医師免許取得後２年の初期研修を修了した後に、３年以上の小児科診療の臨床研修かつ３年以上の季節性アレルギー性鼻炎を含むアレルギー診療の臨床研修を含む４年以上の臨床経験を有していること。\n　②　投与量の設定に用いた血清中総IgE濃度及び当該検査の実施年月日\n　③　患者がスギ花粉による季節性アレルギー性鼻炎であると判断した理由\n　④　前スギ花粉シーズンにおける鼻症状及び本製剤の投与時における鼻症状。なお、鼻症状としては、くしゃみ発作の1日回数、擤鼻の1日回数及び鼻閉の状態をそれぞれ記載すること。\n　⑤　前スギ花粉シーズンに治療に用いた鼻噴霧用ステロイド及びケミカルメディエーター受容体拮抗薬の成分名及び一日投与量\n　⑥　既存治療で効果不十分と判断した理由\n　⑦　アレルゲン免疫療法（減感作療法）に関する説明","items":[{"c":"820600251","h":"医師要件ア（ゾレア皮下注用１５０ｍｇ等）","a":0},{"c":"820600252","h":"医師要件イ（ゾレア皮下注用１５０ｍｇ等）","a":0},{"c":"820600253","h":"医師要件ウ（ゾレア皮下注用１５０ｍｇ等）","a":0},{"c":"820600254","h":"医師要件エ（ゾレア皮下注用１５０ｍｇ等）","a":0},{"c":"830600122","h":"投与量の設定に用いた血清中総ＩｇＥ濃度（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"850600140","h":"投与量の設定に用いた血清中総ＩｇＥ検査の実施年月日（ゾレア皮下注用１５０ｍｇ等）；（元号）yy\"年\"mm\"月\"dd\"日\"","a":0},{"c":"830600052","h":"スギ花粉による季節性アレルギー性鼻炎であると判断した理由（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"842600012","h":"前スギ花粉シーズンにおける鼻症状（くしゃみ発作の1日回数）（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"842600013","h":"前スギ花粉シーズンにおける鼻症状（こう鼻の1日回数）（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"830600053","h":"前スギ花粉シーズンにおける鼻症状（鼻閉の状態）（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"842600014","h":"本製剤の投与時における鼻症状（くしゃみ発作の1日回数）（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"842600015","h":"本製剤の投与時における鼻症状（こう鼻の1日回数）（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"830600054","h":"本製剤の投与時における鼻症状（鼻閉の状態）（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"830600055","h":"前スギ花粉シーズンに治療に用いた鼻噴霧用ステロイドの成分名（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"830600056","h":"前スギ花粉シーズンに治療に用いた鼻噴霧用ステロイドの一日投与量（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"830600057","h":"前スギ花粉シーズンに治療に用いたケミカルメディエーター受容体拮抗薬の成分名（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"830600058","h":"前スギ花粉シーズンに治療に用いたケミカルメディエーター受容体拮抗薬の一日投与量（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"830600059","h":"既存治療で効果不十分と判断した理由（ゾレア皮下注用１５０ｍｇ等）；******","a":0},{"c":"830600060","h":"アレルゲン免疫療法（減感作療法）に関する説明内容（ゾレア皮下注用１５０ｍｇ等）；******","a":0}]},{"k":"（スギ花粉による季節性アレルギー性鼻炎に投与する場合で  Tesla以上）が実施可能な医療機関であり、かつ、ＡＲＩＡが認められた場合に、画像所見や症状の有無から、本剤の投与継続、中断又は中止を判断し、かつ、施設内で必要な対応ができる体制が整っていること\n　　　Ⅱ　認知機能のスコア評価（ＭＭＳＥスコア）及び臨床認知症尺度（ＣＤＲ全般スコア）が実施可能な者が配置されていること\n　　　Ⅲ　同一施設内又は連携がとれる施設においてＰＥＴ検査又はＣＳＦ検査が実施可能であること\n　　　Ⅳ　上記の④及び⑤に該当する、常勤医師が複数名配置されていること\n　　　Ⅴ　ＣＤＲ全般スコア評価に精通し、一定以上の評価経験を有する医療従事者がいること\n　　　Ⅵ　ＡＲＩＡのリスク管理に必要な知識を有し、かつ、ＭＲＩ読影に関する医療従事者向け研修を受講した、ＡＲＩＡの鑑別を含むＭＲＩ読影が適切に行える常勤医が１名以上いること\n　　　Ⅶ　認知症疾患医療センター又は認知症疾患医療センターと連携がとれる施設であること\n　　　Ⅷ　製造販売業者に課せられている全例調査を確実に実施できる施設であること","items":[{"c":"820600344","h":"患者要件ア（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600345","h":"患者要件イ（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600346","h":"患者要件ウ（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600347","h":"患者要件エ（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600348","h":"患者要件オ（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"842600041","h":"認知機能評価ＭＭＳＥスコア（レケンビ点滴静注２００ｍｇ等）；******","a":0},{"c":"850600219","h":"認知機能評価ＭＭＳＥスコアの実施年月日（レケンビ点滴静注２００ｍｇ等）；（元号）yy\"年\"mm\"月\"dd\"日\"","a":0},{"c":"842600042","h":"臨床認知症尺度ＣＤＲ全般スコア（レケンビ点滴静注２００ｍｇ等）；******","a":0},{"c":"850600220","h":"臨床認知症尺度ＣＤＲ全般スコアの実施年月日（レケンビ点滴静注２００ｍｇ等）；（元号）yy\"年\"mm\"月\"dd\"日\"","a":0},{"c":"850600221","h":"アミロイドＰＥＴの実施年月日（レケンビ点滴静注２００ｍｇ等）；（元号）yy\"年\"mm\"月\"dd\"日\"","a":0},{"c":"830600188","h":"アミロイドＰＥＴ検査実施施設名（レケンビ点滴静注２００ｍｇ等）；******","a":0},{"c":"850600222","h":"脳脊髄液（ＣＳＦ）検査の実施年月日（レケンビ点滴静注２００ｍｇ等）；（元号）yy\"年\"mm\"月\"dd\"日\"","a":0},{"c":"830600189","h":"脳脊髄液（ＣＳＦ）検査検査実施施設名（レケンビ点滴静注２００ｍｇ等）；******","a":0},{"c":"820600349","h":"医師要件ア（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600350","h":"医師要件イ（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600351","h":"医師要件ウ（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600352","h":"医師要件エ（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600353","h":"医師要件オ（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600354","h":"医師要件カ（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600355","h":"医師要件キ（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600356","h":"医師要件ク（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600357","h":"施設要件ア（レケンビ点滴静注２００ｍｇ等）","a":0},{"c":"820600358","h":"施設要件イ（レケンビ点滴静注２００ｍｇ等）","a":0}]},{"k":"（投与開始後６か月以降の投与の場合）\n次の事項を記載すること。\n①　本製剤の投与施設（「施設要件ウ」又は「施設要件エ」と記載）及び「施設要件エ」に該当する場合は、連携施設名及び所在地\n　ウ function normChar(ch){
  const s=ch.normalize('NFKC').toLowerCase(); let o='';
  for(const c of s){const cp=c.codePointAt(0); o+=(cp>=0x3041&&cp<=0x3096)?String.fromCodePoint(cp+0x60):c;}
  return o;
}
function norm(s){ let o=''; for(const ch of (s||'')) o+=normChar(ch); return o; }
function buildNorm(raw){ let nm=''; const map=[];
  for(let i=0;i<raw.length;i++){ const nc=normChar(raw[i]); for(let j=0;j<nc.length;j++) map.push(i); nm+=nc; }
  map.push(raw.length); return {nm,map}; }
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function hlite(raw,nq){
  if(!nq) return esc(raw);
  const {nm,map}=buildNorm(raw); const ranges=[]; let from=0,idx;
  while((idx=nm.indexOf(nq,from))>=0){ ranges.push([map[idx],map[idx+nq.length]]); from=idx+nq.length; }
  if(!ranges.length) return esc(raw);
  let res='',last=0; for(const [s,e] of ranges){ res+=esc(raw.slice(last,s))+'<mark>'+esc(raw.slice(s,e))+'</mark>'; last=e; }
  return res+esc(raw.slice(last));
}
function snippet(raw,nq,pad){
  pad=pad||36; const {nm,map}=buildNorm(raw); const idx=nm.indexOf(nq);
  if(idx<0) return esc(raw.slice(0,pad*2));
  const rs=map[idx], re=map[idx+nq.length];
  let a=Math.max(0,rs-pad), b=Math.min(raw.length,re+pad);
  return (a>0?'…':'')+esc(raw.slice(a,rs))+'<mark>'+esc(raw.slice(rs,re))+'</mark>'+esc(raw.slice(re,b))+(b<raw.length?'…':'');
}

function rowOf(name){ const c=(name||'').normalize('NFKC')[0]||'';
  const k=(c>='ぁ'&&c<='ゖ')?String.fromCharCode(c.charCodeAt(0)+0x60):c;
  for(const r of ROWS){ if(r.slice(1).includes(k)) return r[0]; } return '他'; }

const kanaBox=$('kana');
['すべて','ア','カ','サ','タ','ナ','ハ','マ','ヤ','ラ','ワ'].forEach((label,i)=>{
  const b=document.createElement('button'); b.textContent=label; b.dataset.row=i===0?'':label;
  if(i===0)b.classList.add('on');
  b.onclick=()=>{state.row=b.dataset.row; document.querySelectorAll('.kana button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); render();};
  kanaBox.appendChild(b);
});
// mode toggle
document.querySelectorAll('#modes button').forEach(b=>b.onclick=()=>{
  state.mode=b.dataset.mode; document.querySelectorAll('#modes button').forEach(x=>x.classList.toggle('on',x===b));
  $('q').placeholder = state.mode==='name'
    ? '医薬品名称で検索（1文字からOK・ひらがな可）'
    : '記載事項・表示文言の中の言葉で検索';
  $('kana').style.display = state.mode==='name' ? 'flex' : 'none';
  render();
});

function filtered(){
  const nq=norm(state.q);
  if(state.mode==='name')
    return drugs.filter(d=>(!state.row||d._row===state.row)&&(!nq||d._k.includes(nq)));
  if(!nq) return [];
  return drugs.filter(d=>d._full.includes(nq));
}
function render(){
  const res=filtered(), nq=norm(state.q);
  $('count').textContent = state.mode==='full'&&!nq
    ? '全文検索：言葉を入力してください'
    : `${res.length} 件 / 全 ${drugs.length} 品目`;
  const ul=$('list'); ul.innerHTML='';
  res.forEach(d=>{
    const li=document.createElement('li'); li.dataset.no=d.no;
    if(state.sel===d.no) li.classList.add('sel');
    let html=`<span class="no">${esc(d.no)}</span><span class="nm">${hlite(d.name,state.mode==='name'?nq:'')}`;
    if(state.mode==='full'&&nq){
      const f=d._fields.find(f=>norm(f[2]).includes(nq));
      if(f) html+=`<span class="snip"><span class="ftag ${f[0]}">${f[1]}</span>${snippet(f[2],nq)}</span>`;
    }
    html+='</span>';
    li.innerHTML=html; li.onclick=()=>select(d.no); ul.appendChild(li);
  });
  if(res.length===1&&state.q) select(res[0].no);
}
function itemHTML(it,hq){
  const ap=it.a===1;
  const code=it.c?`<span class="code" title="クリックでコピー" data-c="${esc(it.c)}">${hq?hlite(it.c,hq):esc(it.c)}</span>`:'';
  return `<div class="item ${ap?'ap':''}"><span class="badge ${ap?'ap':'no'}">${ap?'○ 適用':'ー'}</span>
    <span class="itxt"><span class="hy">${hq?hlite(it.h,hq):esc(it.h)}</span><br>${code}</span></div>`;
}
function select(no){
  state.sel=no;
  document.querySelectorAll('.list li').forEach(li=>li.classList.toggle('sel',li.dataset.no===no));
  const d=drugs.find(x=>x.no===no); if(!d) return;
  const nq=norm(state.q);
  const hq = state.mode==='full' ? nq : '';        // body highlight only in full mode
  document.body.classList.add('detail-open');
  let h=`<button class="backbtn" onclick="document.body.classList.remove('detail-open')">← 一覧へ戻る</button>`;
  h+=`<div class="dhead"><span class="no">No.${esc(d.no)}</span><div><h2>${hlite(d.name,nq)}</h2>`;
  if(d.eff) h+=`<span class="eff">効能・効果：${hq?hlite(d.eff,hq):esc(d.eff)}</span>`;
  h+=`</div></div>`;
  d.blocks.forEach(b=>{
    h+=`<div class="block">`;
    if(b.k) h+=`<div class="klabel">記載事項</div><div class="ktext">${hq?hlite(b.k,hq):esc(b.k)}</div>`;
    if(b.items&&b.items.length){
      h+=`<div class="hylabel">レセプト表示文言（${b.items.length}件）</div><div class="items">`;
      b.items.forEach(it=>h+=itemHTML(it,hq)); h+=`</div>`;
    }
    h+=`</div>`;
  });
  const di=$('detailInner'); di.innerHTML=h; $('detail').scrollTop=0;
  di.querySelectorAll('.code').forEach(el=>el.onclick=()=>{
    navigator.clipboard&&navigator.clipboard.writeText(el.dataset.c);
    const o=el.textContent; el.textContent='コピー済'; setTimeout(()=>el.textContent=o,900);});
  // jump to first highlight in body
  if(hq){const m=di.querySelector('.ktext mark,.hy mark'); if(m&&m.scrollIntoView) m.scrollIntoView({block:'center'});}
}
const qEl=$('q');
qEl.oninput=()=>{state.q=qEl.value; $('clear').style.display=qEl.value?'block':'none'; render();};
$('clear').onclick=()=>{qEl.value='';state.q='';$('clear').style.display='none';qEl.focus();render();};
qEl.onkeydown=e=>{
  const items=[...document.querySelectorAll('.list li')]; if(!items.length)return;
  let i=items.findIndex(x=>x.classList.contains('sel'));
  if(e.key==='ArrowDown'){e.preventDefault();i=Math.min(items.length-1,i+1);select(items[i].dataset.no);items[i].scrollIntoView({block:'nearest'});}
  else if(e.key==='ArrowUp'){e.preventDefault();i=Math.max(0,i-1);select(items[i].dataset.no);items[i].scrollIntoView({block:'nearest'});}
  else if(e.key==='Enter'&&i>=0){select(items[i].dataset.no);}
};
render();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}</script>
</body>
</html>
